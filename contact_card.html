<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Card</title>
    <meta name="robots" content="noindex, nofollow"> <!-- 検索エンジンに登録させない -->
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Righteous', cursive; color: #007bff; margin-bottom: 5px; }
        .title { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        .info-row { text-align: left; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 0.95em; }
        .info-label { font-size: 0.75em; color: #007bff; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .btn-save { background: #007bff; color: white; border: none; padding: 15px 20px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; font-size: 1.1em; }
        .btn-save:hover { background: #0056b3; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="disp-name">Loading...</h1>
        <div id="disp-title" class="title"></div>
        
        <div id="info-container"></div>

        <button class="btn-save" onclick="downloadVCard()">連絡先を保存する</button>
    </div>

    <script>
        async function decryptData(base64Data, password) {
            try {
                const combined = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                const salt = combined.slice(0, 16);
                const iv = combined.slice(16, 28);
                const data = combined.slice(28);
                
                const encoder = new TextEncoder();
                const passwordKey = await window.crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
                const key = await window.crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                    passwordKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
                );
                
                const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                throw new Error("パスワードが正しくないか、データが壊れています");
            }
        }

        const params = new URLSearchParams(window.location.search);
        let data = { n: '', c: '', t: '', tel: '', e: '', u: '', a: '' };

        async function init() {
            const packedData = params.get('d');
            if (!packedData) return render();

            if (packedData.startsWith("enc:")) {
                const password = prompt("この連絡先は保護されています。パスワードを入力してください：");
                if (!password) return alert("パスワードが必要です");
                
                try {
                    const jsonStr = await decryptData(packedData.replace("enc:", ""), password);
                    data = JSON.parse(jsonStr);
                } catch (e) {
                    alert(e.message);
                    return;
                }
            } else {
            try {
                const jsonStr = decodeURIComponent(escape(atob(packedData)));
                data = JSON.parse(jsonStr);
            } catch (e) {
                console.error("データの読み込みに失敗しました", e);
            }
            }
            render();
        }

        function render() {
            // 従来のパラメータも念のため維持
            if(!data.n) data = {
                n: params.get('n') || '',
                c: params.get('c') || '',
                t: params.get('t') || '',
                tel: params.get('tel') || '',
                e: params.get('e') || '',
                u: params.get('u') || '',
                a: params.get('a') || ''
            };

        document.getElementById('disp-name').textContent = data.n || 'No Name';
        document.getElementById('disp-title').textContent = (data.c ? data.c + ' ' : '') + data.t;

        const container = document.getElementById('info-container');
        const fields = [
            { label: 'Phone', val: data.tel },
            { label: 'Email', val: data.e },
            { label: 'Web', val: data.u },
            { label: 'Address', val: data.a }
        ];

        fields.forEach(f => {
            if (f.val) {
                const div = document.createElement('div');
                div.className = 'info-row';
                div.innerHTML = `<span class="info-label">${f.label}</span>${f.val}`;
                container.appendChild(div);
            }
        });

        function downloadVCard() {
            // vCard 3.0形式をブラウザで動的に生成
            const vcard = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                `FN:${data.n}`,
                `N:;${data.n};;;`,
                data.c ? `ORG:${data.c}` : "",
                data.t ? `TITLE:${data.t}` : "",
                data.tel ? `TEL;TYPE=CELL,VOICE:${data.tel}` : "",
                data.e ? `EMAIL;TYPE=WORK,INTERNET:${data.e}` : "",
                data.u ? `URL:${data.u}` : "",
                data.a ? `ADR;TYPE=WORK:;;${data.a};;;;` : "",
                "END:VCARD"
            ].filter(line => line !== "").join("\r\n");

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${data.n || 'contact'}.vcf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // ページ読み込み完了時に初期化処理を実行
        init();
    </script>
</body>
</html>
